name: tests

on:
  # No `push` trigger on main: PRs run the suite at merge time, so the
  # post-merge push to main would just re-run an identical green job.
  # Use the weekly schedule below (and workflow_dispatch) to catch any
  # regressions that slip in through a direct push.
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_slow:
        description: "Include @pytest.mark.slow tests (full-sky Wigner 3j + 200k MC)?"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
  schedule:
    # Weekly full-suite run, Sunday 04:00 UTC
    - cron: "0 4 * * 0"

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.10
        with:
          pixi-version: v0.68.0
          cache: true

      - name: Lint with ruff
        run: pixi run lint

      - name: Run pytest (fast subset)
        if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.run_slow != 'true')
        run: pixi run test

      - name: Run pytest (full suite, includes slow)
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_slow == 'true')
        run: pixi run test-all
