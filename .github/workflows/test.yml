name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_slow:
        description: "Include @pytest.mark.slow tests (full-sky Wigner 3j + 200k MC)?"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
  schedule:
    # Weekly full-suite run, Sunday 04:00 UTC
    - cron: "0 4 * * 0"

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install package + test extras
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run pytest (fast subset)
        if: github.event_name == 'push' || github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.run_slow != 'true')
        run: pytest tests/ -q -m "not slow"

      - name: Run pytest (full suite, includes slow)
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_slow == 'true')
        run: pytest tests/ -q
