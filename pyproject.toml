[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "cmb-forecast"
version = "0.1.0"
description = "Fisher-matrix forecasting for CMB B-mode polarization experiments"
requires-python = ">=3.12"
dependencies = [
    "jax>=0.4",
    "jaxlib>=0.4",
    "numpy>=1.24",
    "scipy>=1.10",
]

[project.optional-dependencies]
dev = ["pytest>=7.0"]
camb = ["camb"]
notebooks = ["jupyterlab", "ipykernel", "matplotlib"]

[tool.setuptools.packages.find]
include = ["cmb_forecast*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
