name: augr
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - pip
  - pip:
      - jax
      - numpy
      - scipy
      - matplotlib
      - pytest
      - pywigxjpf  # exact Wigner 3j for delensing validation tests
      - cmbroom    # BROOM component-separation pipeline (residual templates, NILC/GNILC)
      - camb  # only needed to regenerate data/ templates via generate_camb_templates.py
      - jupyterlab
      - ipykernel
